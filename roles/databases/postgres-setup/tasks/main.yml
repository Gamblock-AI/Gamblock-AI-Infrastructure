---
# Deploy PostgreSQL as a Docker container on the postgres network.
- name: Create PostgreSQL install directory
  ansible.builtin.file:
    path: "{{ docker_stack_base }}/postgres"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: "Create postgres data dir"
  ansible.builtin.file:
    path: "{{ docker_stack_base }}/postgres/data"
    state: directory
    mode: "0755"
    owner: "999"  # postgres uid inside the container
    group: "999"

- name: Create PostgreSQL backup directory
  ansible.builtin.file:
    path: "{{ docker_stack_base }}/postgres/backups"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "Render postgres env file"
  ansible.builtin.template:
    src: postgres.env.j2
    dest: "{{ docker_stack_base }}/postgres/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: "Render postgres docker-compose"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ docker_stack_base }}/postgres/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: "Start PostgreSQL"
  community.docker.docker_compose_v2:
    project_src: "{{ docker_stack_base }}/postgres"
    state: present
    pull: missing
    remove_orphans: true
    wait: true
    wait_timeout: 120

- name: "Wait for PostgreSQL to accept connections"
  ansible.builtin.shell: |
    docker exec {{ postgres_container_name }} pg_isready -U {{ gamblock_db_username }}
  register: pg_ready
  retries: 15
  delay: 2
  until: pg_ready.rc == 0
  changed_when: false
