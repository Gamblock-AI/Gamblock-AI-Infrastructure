---
# Install Docker Engine + compose plugin and create the shared networks.
- name: "Install Docker prerequisites"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-docker
    update_cache: true

- name: "Add Docker GPG key"
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: "Add Docker apt repo"
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: "Install Docker Engine + compose plugin"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    update_cache: true

- name: "Ensure docker service is enabled and running"
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Configure Docker log rotation
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Create reverse proxy network
  community.docker.docker_network:
    name: "{{ proxy_network }}"
    state: present

- name: "Create postgres network"
  community.docker.docker_network:
    name: "{{ postgres_network }}"
    state: present
