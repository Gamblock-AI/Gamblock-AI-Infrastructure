---
# Shared tasks for deploying an application from private GHCR.
- name: "Set install directory"
  ansible.builtin.set_fact:
    app_install_dir: "{{ docker_stack_applications }}/{{ app_name }}"

- name: "Create application install directory"
  ansible.builtin.file:
    path: "{{ app_install_dir }}"
    state: directory
    mode: "0750"
    owner: root
    group: root

- name: "Ensure docker-updates log dir exists"
  ansible.builtin.file:
    path: "/var/log/docker-updates"
    state: directory
    mode: "0750"
    owner: root
    group: root

- name: "Copy update.sh to application directory"
  ansible.builtin.copy:
    src: update.sh
    dest: "{{ app_install_dir }}/update.sh"
    mode: "0755"
    owner: root
    group: root

- name: "Render docker-compose.yml"
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ app_install_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"

- name: "Render .env"
  ansible.builtin.template:
    src: .env.j2
    dest: "{{ app_install_dir }}/.env"
    mode: "0600"
    owner: root
    group: root
  no_log: true

- name: "Log in to GHCR"
  community.docker.docker_login:
    registry_url: "{{ github_registry }}"
    username: "{{ github_registry_username }}"
    password: "{{ vault_github_registry_pat }}"
    reauthorize: true
  no_log: true

- name: Pull application images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ app_install_dir }}"
    policy: always
    profiles: "{{ app_prepare_profiles | default([]) }}"

- name: Run application preparation service
  community.docker.docker_compose_v2_run:
    project_src: "{{ app_install_dir }}"
    service: "{{ item }}"
    profiles: "{{ app_prepare_profiles | default([]) }}"
    cleanup: true
    interactive: false
    no_deps: true
  loop: "{{ app_prepare_services | default([]) }}"

- name: "Start {{ app_name }}"
  community.docker.docker_compose_v2:
    project_src: "{{ app_install_dir }}"
    state: present
    pull: never
    recreate: auto
    remove_orphans: true
    wait: true
    wait_timeout: 180
